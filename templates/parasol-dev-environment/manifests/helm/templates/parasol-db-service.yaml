apiVersion: v1
kind: Service
metadata:
  name: parasol-db
  namespace: ${{ values.namespace }}
  labels:
    app: parasol-db
    app.kubernetes.io/name: parasol-insurance-${{ values.owner }}
    app.kubernetes.io/part-of: parasol-insurance-dev
spec:
  ports:
    - name: postgresql
      protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: parasol-db
