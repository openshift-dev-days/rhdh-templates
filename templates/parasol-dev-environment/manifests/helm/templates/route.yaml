apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-insurance
  namespace: ${{ values.namespace }}
  labels:
    app: parasol-insurance
    app.kubernetes.io/name: parasol-insurance-${{ values.owner }}
    app.kubernetes.io/part-of: parasol-insurance-dev
spec:
  to:
    kind: Service
    name: parasol-insurance
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
