apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: parasol-dev-environment
  title: Parasol Insurance Development Environment
  description: Creates an isolated development environment with a feature branch, CI/CD pipeline, and catalog entry for the Parasol Insurance application.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - parasol
    - development
spec:
  owner: group:default/users
  type: service

  parameters:
    - title: Development Branch
      required:
        - branch
      properties:
        branch:
          title: Branch Name
          type: string
          description: Branch name in the parasol-insurance source repo

  steps:
    - id: create-branch
      name: Create Source Branch
      action: gitlab:repo:push
      input:
        repoUrl: {{ gitlab_host }}?repo=parasol-insurance&owner=${{ user.entity.metadata.name }}
        branchName: ${{ parameters.branch }}
        commitMessage: 'Scaffolder commit initializing branch "${{ parameters.branch }}"'
        commitAction: create

    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./manifests/
        values:
          namespace: ${{ user.entity.metadata.name }}-${{ parameters.branch }}
          branch: ${{ parameters.branch }}
          source_repo: https://{{ gitlab_host }}/${{ user.entity.metadata.name }}/parasol-insurance.git
          owner: ${{ user.entity.metadata.name }}
          image_host: {{ quay_host }}
          image_organization: parasol
          image_name: parasol-insurance-${{ user.entity.metadata.name }}
          image_tag: latest
          gitlab_host: {{ gitlab_host }}
          cluster_subdomain: {{ cluster_subdomain }}
          gitops_namespace: openshift-gitops
          dev_email: ${{ user.entity.spec.profile.email }}

    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: {{ gitlab_host }}?owner=${{ user.entity.metadata.name }}&repo=parasol-insurance-${{ parameters.branch }}-gitops
        defaultBranch: main
        repoVisibility: public

    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: parasol-insurance-dev-${{ user.entity.metadata.name }}-${{ parameters.branch }}
        argoInstance: main
        namespace: openshift-gitops
        repoUrl: ${{ steps.publish.output.remoteUrl }}.git
        path: argocd

    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitOps Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
